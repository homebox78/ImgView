<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImgView — 보기 좋게, 빠르게</title>
<style>
@font-face{
  font-family:'Pretendard Variable';font-weight:45 920;font-style:normal;
  font-display:swap;src:url('fonts/PretendardVariable.woff2') format('woff2');
}
/* === ImgView — ImageZip 시리즈 공통 톤 (중립 near-black 램프: 검정 강약을 일관되게) === */
:root{
  --bg:#0a0a0b;--bg-soft:#0f0f11;--surface:#151517;--surface-2:#1c1c1f;
  --surface-3:#242427;--border:#2e2e33;--border-soft:#1d1d20;
  --text:#f4f5f6;--text-dim:#dfe1e4;--text-faint:#a7adb5;
  --accent:#3fe0b0;--accent-deep:#1aa888;--accent-ink:#04221b;
  --accent-glow:rgba(63,224,176,.16);--danger:#ff7a7a;
  --btn:#242427;--btn-bd:#3a3a40;--btn-hi:#2c2c31;--btn-bd-hi:#47474e;
  --radius:18px;--radius-sm:12px;
  --shadow:0 24px 60px -18px rgba(0,0,0,.75);--shadow-soft:0 10px 30px -12px rgba(0,0,0,.6);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
  background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;
  overflow:hidden;letter-spacing:-.01em;user-select:none}
.atmos{position:fixed;inset:0;z-index:-2;pointer-events:none}
.atmos::before{content:"";position:absolute;top:-30%;left:50%;transform:translateX(-50%);
  width:80vw;height:60vh;background:radial-gradient(ellipse at center,var(--accent-glow),transparent 65%);
  filter:blur(40px);opacity:.6}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* 상단바 */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:11px 18px;background:var(--bg-soft);border-bottom:1px solid var(--border);flex:none}
.brand{display:flex;align-items:center;gap:11px;flex:none}
.logo{width:36px;height:36px;border-radius:11px;
  background:linear-gradient(145deg,var(--surface-3),var(--surface));
  border:1px solid var(--border);display:grid;place-items:center}
.logo svg{width:20px;height:20px}
.brand-name{font-size:16.5px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.brand-name b{color:var(--accent)}
.brand-sub{font-size:10.5px;color:var(--text-faint);margin-top:2px}
/* 툴바: 기능 그룹으로 정돈 */
.tools{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.tgroup{display:flex;align-items:center;gap:4px;padding:3px;background:var(--surface);
  border:1px solid var(--border-soft);border-radius:11px}
.tbtn{display:flex;align-items:center;gap:6px;height:34px;padding:0 12px;
  border:1px solid transparent;background:transparent;color:var(--text-dim);
  border-radius:8px;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;
  transition:.15s var(--ease);white-space:nowrap}
.tbtn:hover:not(:disabled){color:var(--text);background:var(--btn-hi)}
.tbtn.icon{width:34px;padding:0;justify-content:center}
.tbtn.accent{background:linear-gradient(135deg,var(--accent),var(--accent-deep));
  color:var(--accent-ink);border:none;font-weight:800;height:34px;padding:0 15px;box-shadow:0 4px 14px -6px var(--accent-glow)}
.tbtn.accent:hover{transform:translateY(-1px);background:linear-gradient(135deg,var(--accent),var(--accent-deep))}
.tbtn svg{width:15px;height:15px;opacity:.92}
.tbtn:disabled{opacity:.32;cursor:not-allowed}
.sep{width:1px;height:20px;background:var(--border);margin:0 3px}

/* 본문 */
.body{flex:1;position:relative;display:flex;min-height:0}

/* 빈 화면(드롭존) — 그리드 영역 안에 표시 */
.drophint{margin:auto;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:18px;text-align:center;cursor:pointer}
.gridscreen.drag .grid{background:radial-gradient(ellipse at center,var(--accent-glow),transparent 70%)}
.drop-ico{width:74px;height:74px;border-radius:20px;
  background:linear-gradient(150deg,var(--surface-3),var(--surface));
  border:1px solid var(--border);display:grid;place-items:center;animation:floaty 3.6s ease-in-out infinite}
.gridscreen.drag .drop-ico{animation:none;border-color:var(--accent)}
.drop-ico svg{width:34px;height:34px;color:var(--accent)}
.drop-title{font-size:19px;font-weight:700}
.drop-title em{font-style:normal;color:var(--accent)}
.drop-sub{font-size:13px;color:var(--text-dim);margin-top:6px}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

/* === 그리드 화면: [폴더 트리] [바둑판] [미리보기] === */
.gridscreen{flex:1;display:flex;min-height:0}

/* 좌측 폴더 트리(탐색기) */
.tree{width:240px;flex:none;border-right:1px solid var(--border-soft);overflow:auto;
  padding:8px 6px;background:var(--bg-soft);font-size:12.5px}
.tree-head{display:flex;align-items:center;gap:6px;padding:4px 8px 8px;
  font-size:11px;font-weight:700;color:var(--text-faint);letter-spacing:.02em}
.tpath{padding:0 6px 8px}
.tpath input{width:100%;background:var(--bg-soft);border:1px solid var(--border);border-radius:8px;
  color:var(--text);padding:7px 9px;font-size:11px;font-family:inherit;outline:none}
.tpath input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
.tpath input::placeholder{color:#6a727e}
.tnode{}
.trow{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:7px;
  cursor:pointer;color:var(--text-faint);white-space:nowrap;line-height:1.3}
.trow:hover{background:var(--surface-2);color:var(--text)}
.trow.sel{background:var(--surface-3);color:var(--text)}
.tarrow{width:13px;height:13px;flex:none;display:grid;place-items:center;
  color:var(--text-faint);transition:transform .15s var(--ease)}
.tarrow svg{width:9px;height:9px}
.tarrow.open{transform:rotate(90deg)}
.tarrow.leaf{visibility:hidden}
.tarrow.busy{animation:tspin .7s linear infinite;color:var(--accent)}
@keyframes tspin{to{transform:rotate(360deg)}}
.ticon{width:15px;height:15px;flex:none;color:var(--accent);display:grid;place-items:center}
.ticon svg{width:15px;height:15px}
.tlabel{overflow:hidden;text-overflow:ellipsis}
.tchildren{margin-left:13px;display:none}
.tchildren.open{display:block}

/* 가운데 바둑판 */
.gridmain{flex:1;display:flex;flex-direction:column;min-width:0}
.grid{flex:1;overflow-y:auto;padding:18px;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  grid-auto-rows:min-content;gap:16px;align-content:start}
.grid.empty-mode{display:flex}
.tile{cursor:pointer;border-radius:14px;overflow:hidden;background:var(--surface);
  border:1px solid var(--border-soft);transition:border-color .16s var(--ease),box-shadow .16s var(--ease);
  content-visibility:auto;contain-intrinsic-size:auto 200px}
.tile:hover{border-color:var(--surface-3);box-shadow:var(--shadow-soft)}
.tile.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 12px 28px -14px var(--accent-glow)}
.tile-img{width:100%;aspect-ratio:1/1;background:#0a0b0e;display:grid;place-items:center;overflow:hidden}
.tile-img img{width:100%;height:100%;object-fit:contain;display:block;opacity:0;transition:opacity .2s var(--ease)}
.tile-img img.loaded{opacity:1}
.tile-name{padding:8px 10px;font-size:11.5px;color:var(--text-faint);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tile.active .tile-name{color:var(--text)}

/* 우측 미리보기 패널 */
.preview{width:340px;flex:none;border-left:1px solid var(--border-soft);
  padding:18px;display:flex;flex-direction:column;gap:14px;background:var(--bg-soft)}
.preview-empty{margin:auto;text-align:center;color:var(--text-faint);font-size:13px;line-height:1.8}
.pv-img{flex:1;min-height:0;display:grid;place-items:center;background:#000;
  border-radius:14px;overflow:hidden;border:1px solid var(--border-soft)}
.pv-img img{max-width:100%;max-height:100%;object-fit:contain}
.pv-meta{flex:none}
.pv-name{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pv-dim{font-size:12px;color:var(--text-faint);margin-top:4px}
.pv-open{width:100%;justify-content:center;height:40px;font-size:13px}

/* === 단독 크게보기 화면 === */
.viewer{flex:1;position:relative;display:none;align-items:center;justify-content:center;
  background:#000;overflow:hidden;min-width:0}
.viewer img{max-width:100%;max-height:100%;object-fit:contain;
  transition:transform .12s var(--ease)}
.single-back{position:absolute;top:16px;left:16px;z-index:6;display:flex;align-items:center;gap:6px;
  height:36px;padding:0 14px;border-radius:9px;border:1px solid var(--border);
  background:rgba(12,13,16,.55);backdrop-filter:blur(6px);color:#fff;cursor:pointer;
  font-family:inherit;font-size:12.5px;font-weight:600;opacity:0;transition:.2s var(--ease)}
.viewer:hover .single-back{opacity:1}
.single-back:hover{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}

/* 좌우 이동 버튼 */
.nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;
  border-radius:50%;background:rgba(12,13,16,.6);backdrop-filter:blur(6px);
  border:1px solid var(--border);color:#fff;cursor:pointer;display:grid;place-items:center;
  opacity:0;transition:.2s var(--ease);z-index:5}
.viewer:hover .nav{opacity:1}
.nav:hover{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.nav.prev{left:16px}.nav.next{right:16px}
.nav svg{width:20px;height:20px}

/* 하단 상태바 */
.statusbar{flex:none;height:34px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;border-top:1px solid var(--border-soft);font-size:11.5px;color:var(--text-faint)}
.statusbar b{color:var(--text-dim);font-weight:600}
.zoomctl{display:flex;align-items:center;gap:6px}
.zoomctl button{height:24px;min-width:24px;padding:0 5px;border-radius:7px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
.zoomctl button:hover{color:var(--text);border-color:var(--surface-3)}
.zoomctl #zoomFit{padding:0 10px;font-size:12px}

/* 다이얼로그 */
.scrim{position:fixed;inset:0;z-index:50;background:rgba(6,7,9,.72);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center}
.scrim.show{display:flex}
.dialog{width:min(420px,calc(100% - 40px));background:linear-gradient(180deg,var(--surface-2),var(--surface));
  border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:var(--shadow)}
.dialog h3{font-size:16px;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--text-dim);font-weight:600;margin-bottom:7px}
.inp,select{width:100%;background:var(--bg-soft);border:1px solid var(--border);border-radius:10px;
  color:var(--text);padding:10px 12px;font-size:13px;font-family:inherit;outline:none}
select{-webkit-appearance:none;appearance:none;cursor:pointer;padding-right:38px;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23ccd2dc' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right 13px center}
.inp:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.row2{display:flex;gap:10px}
.dlg-actions{display:flex;gap:10px;margin-top:20px}
.dlg-actions button{flex:1;border:none;cursor:pointer;font-family:inherit;font-weight:700;
  font-size:13.5px;padding:12px;border-radius:11px}
.dlg-actions .ghost{background:var(--surface-3);color:var(--text-dim)}
.dlg-actions .primary{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:var(--accent-ink)}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:99px;background:var(--surface-3)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--accent);cursor:pointer;box-shadow:0 0 0 4px var(--accent-glow)}

/* 토스트 */
.toast{position:fixed;bottom:50px;left:50%;transform:translate(-50%,20px);z-index:60;
  background:var(--surface-3);border:1px solid var(--border);color:var(--text);
  padding:11px 19px;border-radius:11px;font-size:13px;box-shadow:var(--shadow-soft);
  opacity:0;pointer-events:none;transition:.3s var(--ease)}
.toast.show{opacity:1;transform:translate(-50%,0)}
*::-webkit-scrollbar{width:10px}
*::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:99px;border:3px solid var(--bg)}

/* === 커스텀 셀렉트 드롭다운 === */
.csel{position:relative}
.csel>select{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
.csel-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:var(--bg-soft);border:1px solid var(--border);border-radius:10px;color:var(--text);
  padding:10px 12px;font-size:13px;font-family:inherit;cursor:pointer;text-align:left}
.csel-btn:hover{border-color:var(--surface-3)}
.csel.open .csel-btn{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.csel-btn svg{width:14px;height:14px;flex:none;color:var(--text-faint);transition:transform .18s var(--ease)}
.csel.open .csel-btn svg{transform:rotate(180deg)}
.csel-menu{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:90;
  background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--border);
  border-radius:12px;box-shadow:var(--shadow);padding:6px;display:none;max-height:260px;overflow:auto}
.csel.open .csel-menu{display:block;animation:cselIn .14s var(--ease)}
@keyframes cselIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.csel-opt{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:8px;font-size:13px;
  color:var(--text-dim);cursor:pointer}
.csel-opt:hover{background:var(--surface-3);color:var(--text)}
.csel-opt.sel{color:var(--accent);font-weight:700}
.csel-opt.sel::after{content:"✓";margin-left:auto;font-size:12px}

/* === 보기 전환 토글 + 자세히 목록 === */
.gridtop{flex:none;display:flex;align-items:center;justify-content:flex-end;gap:8px;
  padding:10px 16px 0}
.vtoggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:2px}
.vbtn{display:flex;align-items:center;gap:5px;height:28px;padding:0 11px;border:none;background:none;
  color:var(--text-faint);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;border-radius:7px}
.vbtn svg{width:14px;height:14px}
.vbtn.active{background:var(--surface-3);color:var(--text)}
.vbtn:hover:not(.active){color:var(--text-dim)}
.grid.list-mode{display:block;padding:14px 16px}
.dl-head,.dl-row{display:grid;grid-template-columns:48px 1fr 120px 92px 150px;align-items:center;gap:10px}
.dl-head{padding:6px 12px;font-size:11.5px;color:var(--text-faint);font-weight:700;
  border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:var(--bg)}
.dl-row{padding:6px 12px;border-radius:9px;cursor:pointer;border:1px solid transparent}
.dl-row:hover{background:var(--surface)}
.dl-row.active{background:var(--surface-2);border-color:var(--accent)}
.dl-thumb{width:48px;height:40px;border-radius:6px;overflow:hidden;background:#0a0b0e;display:grid;place-items:center}
.dl-thumb img{width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity .2s}
.dl-thumb img.loaded{opacity:1}
.dl-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;color:var(--text-dim)}
.dl-row.active .dl-name{color:var(--text)}
.dl-dims,.dl-size,.dl-date{font-size:12px;color:var(--text-faint);white-space:nowrap}

/* === 단독뷰: ImgZip 용량 절감 바 === */
.zipbar{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:6;display:flex;
  align-items:center;gap:12px;background:rgba(16,18,22,.85);backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:12px;padding:8px 10px 8px 16px;box-shadow:var(--shadow-soft);
  font-size:12.5px;color:var(--text-dim);max-width:90%}
.zipbar b{color:var(--accent)}
.zipbtn{display:flex;align-items:center;gap:6px;height:30px;padding:0 13px;border:none;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:var(--accent-ink);
  font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap}
.zipbtn:hover{transform:translateY(-1px)}

/* === 밝기 보정 컨트롤(상태바) === */
.brightctl{display:flex;align-items:center;gap:7px;color:var(--text-faint)}
.brightctl svg{width:15px;height:15px}
.brightctl input[type=range]{width:90px;height:4px;-webkit-appearance:none;border-radius:99px;background:var(--surface-3)}
.brightctl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--accent);cursor:pointer}
.brightctl .bsep{width:1px;height:18px;background:var(--border);margin:0 4px}
</style>
</head>
<body>
<div class="atmos"></div>
<div class="app">
  <!-- 상단바 -->
  <header class="topbar">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="5.5" stroke="url(#g)" stroke-width="1.6"/>
          <circle cx="8.4" cy="13" r="1.25" fill="url(#g)"/>
          <path d="M4.8 18.2L9 13.6l2.6 2.4 3.2-3.6 4.4 5" stroke="url(#g)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="g" x1="3" y1="3" x2="21" y2="21"><stop stop-color="#5fe8c2"/><stop offset="1" stop-color="#1aa888"/></linearGradient></defs>
        </svg>
      </div>
      <div><div class="brand-name">Img<b>View</b></div><div class="brand-sub">보기 좋게, 빠르게</div></div>
    </div>
    <div class="tools">
      <button class="tbtn accent" id="openBtn" title="이미지 열기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        열기</button>
      <button class="tbtn" id="folderBtn" title="폴더 열기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        폴더</button>
      <!-- 편집·변환 그룹 -->
      <div class="tgroup">
        <button class="tbtn icon" id="rotL" disabled title="왼쪽 회전 (Ctrl+,)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.5 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
        <button class="tbtn icon" id="rotR" disabled title="오른쪽 회전 (Ctrl+T)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.5 15a9 9 0 1 1-2.13-9.36L23 10"/></svg></button>
        <button class="tbtn" id="resizeBtn" disabled title="크기변경 (Ctrl+R)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
          크기변경</button>
        <button class="tbtn" id="convBtn" disabled title="포맷변환 (Ctrl+E)">

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const API = window.imgview || null;

let images = [];          // {name, path, url, size, created}
let idx = 0;              // 선택/표시 중인 인덱스
let mode = 'grid';        // 'grid' | 'single'
let viewMode = 'thumb';   // 'thumb' | 'list'
let brightness = 100;     // 단독뷰 밝기(%)
let imgzip = { installed:false, path:null };
let rotation = 0, zoom = 1, fitMode = true;
let panX = 0, panY = 0, panning = false;

function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function current(){return images[idx]||null;}
const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function getDims(url){return new Promise(res=>{const im=new Image();im.onload=()=>res({w:im.naturalWidth,h:im.naturalHeight});im.src=url;});}
function el(t,c){const e=document.createElement(t);if(c)e.className=c;return e;}
function fmtSize(b){ if(b==null)return '-'; if(b<1024)return b+' B'; if(b<1048576)return (b/1024).toFixed(0)+' KB'; if(b<1073741824)return (b/1048576).toFixed(1)+' MB'; return (b/1073741824).toFixed(2)+' GB'; }
function fmtDate(ms){ if(!ms)return '-'; const d=new Date(ms); const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
// 네이티브 select → 커스텀 드롭다운(값/change 이벤트는 그대로 유지)
function enhanceSelect(sel){
  if(!sel||sel._enhanced)return; sel._enhanced=true;
  const wrap=el('div','csel'); sel.parentNode.insertBefore(wrap,sel); wrap.appendChild(sel);
  const opts=[...sel.options].map(o=>({v:o.value,t:o.textContent}));
  const btn=el('button','csel-btn'); btn.type='button';
  const lbl=el('span'); const car=el('span');
  car.innerHTML="<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>";
  btn.append(lbl,car);
  const menu=el('div','csel-menu');
  opts.forEach(o=>{ const d=el('div','csel-opt'); d.textContent=o.t; d.dataset.v=o.v;
    d.onclick=()=>{ sel.value=o.v; sync(); wrap.classList.remove('open'); sel.dispatchEvent(new Event('change',{bubbles:true})); };
    menu.appendChild(d); });
  wrap.append(btn,menu);
  function sync(){ const cur=opts.find(o=>o.v===sel.value)||opts[0]; lbl.textContent=cur?cur.t:''; menu.querySelectorAll('.csel-opt').forEach(d=>d.classList.toggle('sel',d.dataset.v===sel.value)); }
  btn.onclick=e=>{ e.stopPropagation(); const wasOpen=wrap.classList.contains('open'); document.querySelectorAll('.csel.open').forEach(c=>c.classList.remove('open')); if(!wasOpen)wrap.classList.add('open'); };
  sync();
}
document.addEventListener('click',()=>document.querySelectorAll('.csel.open').forEach(c=>c.classList.remove('open')));
function mimeOf(name){
  const ext=(name.split('.').pop()||'').toLowerCase();
  return {jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',webp:'image/webp',
    bmp:'image/bmp',svg:'image/svg+xml',ico:'image/x-icon',tif:'image/tiff',tiff:'image/tiff'}[ext]||'';
}
// 작은 썸네일 생성(캐시) — 그리드 스크롤/미리보기 속도용
async function makeThumb(im){
  if(im.thumb) return im.thumb;
  if(im._thumbing) return im._thumbing;
  im._thumbing=(async()=>{
    try{
      const TW=360; let canvas;
      try{
        const blob=await (await fetch(im.url)).blob();
        const bmp=await createImageBitmap(blob,{resizeWidth:TW,resizeQuality:'medium'});
        canvas=el('canvas'); canvas.width=bmp.width; canvas.height=bmp.height;
        canvas.getContext('2d').drawImage(bmp,0,0); bmp.close();
      }catch(e){ // svg 등 createImageBitmap 미지원 → Image로 폴백
        const img=new Image(); img.src=im.url; await img.decode();
        const r=(img.naturalHeight/img.naturalWidth)||1;
        canvas=el('canvas'); canvas.width=TW; canvas.height=Math.max(1,Math.round(TW*r));
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      }
      im.thumb=await new Promise(res=>canvas.toBlob(b=>res(b?URL.createObjectURL(b):im.url),'image/jpeg',0.82));
      return im.thumb;
    }catch(e){ return im.url; }
  })();
  return im._thumbing;
}
// 실제 원본 해상도 캐시
function ensureDims(im){
  if(im.dw) return Promise.resolve({w:im.dw,h:im.dh});
  return getDims(im.url).then(d=>{im.dw=d.w;im.dh=d.h;return d;});
}

// ---- 모드 전환 ----
function setMode(m){
  mode=m;
  $('#gridScreen').style.display = m==='grid'   ? 'flex':'none';
  $('#singleScreen').style.display = m==='single' ? 'flex':'none';
  $('#zoomctl').style.visibility = m==='single' ? 'visible':'hidden';
  $('#brightctl').style.display = m==='single' ? 'flex':'none';
  updateStatus();
}

function clearImages(){
  if(thumbObserver){thumbObserver.disconnect();thumbObserver=null;}
  images.forEach(im=>{try{URL.revokeObjectURL(im.url);}catch(e){} try{if(im.thumb)URL.revokeObjectURL(im.thumb);}catch(e){}});
  images=[]; idx=0;
}

// ---- 파일 추가 ----
function addFiles(list){
  const wasEmpty = images.length===0;
  for(const f of list){
    const url = f.url || URL.createObjectURL(f.blob || f);
    images.push({ name:f.name, path:f.path||null, url, size:f.size, created:f.created });
  }
  if(mode!=='single'){ setMode('grid'); renderGrid(); }
  if(!images.length){ renderPreview(); setBtns(false); updateStatus(); return; }
  if(wasEmpty) select(0); else if(mode==='grid') select(Math.min(idx,images.length-1));
}

// ---- 그리드(바둑판) ----
const DROP_HINT=`<div class="drophint" id="dropHint">
  <div class="drop-ico">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
  </div>
  <div><div class="drop-title">이미지나 폴더를 <em>여기에</em> 끌어다 놓으세요</div>
    <div class="drop-sub">왼쪽 폴더 트리에서 폴더를 고르거나 · 클릭해서 열기</div></div>
</div>`;
let thumbObserver=null;
function renderGrid(){
  const g=$('#grid');
  if(thumbObserver){thumbObserver.disconnect();thumbObserver=null;}
  g.classList.toggle('list-mode', viewMode==='list');
  if(!images.length){
    g.classList.add('empty-mode'); g.innerHTML=DROP_HINT;
    $('#dropHint').onclick=()=>$('#openBtn').click();
    return;
  }
  g.classList.remove('empty-mode');
  if(viewMode==='list') buildListRows(g); else buildTiles(g);
  observeThumbs(g);
}
function buildTiles(g){
  g.innerHTML = images.map((im,i)=>`
    <div class="tile ${i===idx?'active':''}" data-i="${i}">
      <div class="tile-img"><img data-i="${i}" draggable="false" alt=""></div>
      <div class="tile-name" title="${esc(im.name)}">${esc(im.name)}</div>
    </div>`).join('');
  g.querySelectorAll('.tile').forEach(t=>{
    const i=+t.dataset.i; t.onclick=()=>select(i); t.ondblclick=()=>openSingle(i);
  });
}
function buildListRows(g){
  g.innerHTML = `<div class="dl-head"><span></span><span>이름</span><span>크기</span><span>용량</span><span>생성일</span></div>`
   + images.map((im,i)=>`
    <div class="dl-row ${i===idx?'active':''}" data-i="${i}">
      <span class="dl-thumb"><img data-i="${i}" draggable="false" alt=""></span>
      <span class="dl-name" title="${esc(im.name)}">${esc(im.name)}</span>
      <span class="dl-dims" id="dld${i}">${im.dw?im.dw+'×'+im.dh:'…'}</span>
      <span class="dl-size">${fmtSize(im.size)}</span>
      <span class="dl-date">${fmtDate(im.created)}</span>
    </div>`).join('');
  g.querySelectorAll('.dl-row').forEach(r=>{
    const i=+r.dataset.i; r.onclick=()=>select(i); r.ondblclick=()=>openSingle(i);
  });
}
// 보이는(근처) 항목만 썸네일 생성(+자세히 보기는 해상도도 채움) → 스크롤 부드럽게
function observeThumbs(g){
  thumbObserver=new IntersectionObserver((ents,obs)=>{
    ents.forEach(async en=>{
      if(!en.isIntersecting)return;
      const img=en.target; obs.unobserve(img);
      const i=+img.dataset.i; const im=images[i]; if(!im)return;
      img.src=await makeThumb(im);
      if(img.complete) img.classList.add('loaded'); else img.onload=()=>img.classList.add('loaded');
      if(viewMode==='list'){ ensureDims(im).then(d=>{ const c=$('#dld'+i); if(c)c.textContent=d.w+'×'+d.h; }); }
    });
  },{root:g,rootMargin:'300px 0px'});
  g.querySelectorAll('.tile-img img, .dl-thumb img').forEach(img=>thumbObserver.observe(img));
}
// 보기 전환
function setView(v){
  if(viewMode===v)return; viewMode=v;
  $('#vThumb').classList.toggle('active',v==='thumb');
  $('#vList').classList.toggle('active',v==='list');
  if(mode==='grid'){ renderGrid(); if(images.length) select(idx); }
}

// ---- 폴더 트리(탐색기) ----
const FOLDER_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';
const NET_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="6" rx="1.5"/><rect x="2" y="15" width="20" height="6" rx="1.5"/><path d="M6 6h.01M6 18h.01M12 9v6"/></svg>';
const PC_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="1.5"/><path d="M8 20h8M12 16v4"/></svg>';
const CARET_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';
let curFolder=null;
// 기본 자식 로더: 하위 폴더 (일반 폴더/드라이브/공유)
const dirLoader = async p => (await API.listDir(p)).map(s=>({name:s.name,path:s.path}));
async function initTree(){
  if(!API||!API.listDrives)return;
  const roots=$('#treeRoots');
  const drives=await API.listDrives();
  drives.forEach(d=>roots.appendChild(makeTreeNode(d.name,d.path)));
  // 네트워크 노드(드라이브 문자 없는 NAS/공유 탐색)
  roots.appendChild(makeTreeNode('네트워크','\\\\',{
    icon:NET_SVG, clickable:false,
    loadChildren: async()=> (await API.listNetwork()).map(c=>({
      name:c.name, path:c.path,
      opts:{ icon:PC_SVG, clickable:false,
        loadChildren: async cp=> (await API.listShares(cp)).map(s=>({name:s.name,path:s.path})) }
    }))
  }));
}
// 경로/UNC 직접 열기 → 루트 노드로 추가 + 로드
async function openPathInput(){
  const inp=$('#pathInput'); let p=(inp.value||'').trim();
  if(!p)return;
  if(!/[\\/]$/.test(p)) p+='\\';
  const roots=$('#treeRoots');
  if(![...roots.querySelectorAll(':scope > .tnode > .trow')].some(r=>r.dataset.path.toLowerCase()===p.toLowerCase())){
    roots.insertBefore(makeTreeNode(p.replace(/\\$/,''),p), roots.firstChild);
  }
  const node=[...roots.querySelectorAll(':scope > .tnode > .trow')].find(r=>r.dataset.path.toLowerCase()===p.toLowerCase());
  if(node) node.click();
  inp.value='';
}
// opts: { icon, clickable(기본 true), loadChildren(p)->[{name,path,opts}] }
function makeTreeNode(name,p,opts,depth){
  opts=opts||{}; depth=depth||0;
  const loadChildren = opts.loadChildren || dirLoader;
  const clickable = opts.clickable!==false;
  const node=el('div','tnode');
  const row=el('div','trow'); row.dataset.path=p;
  row.style.fontSize = Math.max(11, 13.5 - depth) + 'px';   // 상위 뎁스일수록 크게(상하 구분)
  const arrow=el('span','tarrow'); arrow.innerHTML=CARET_SVG;
  const icon=el('span','ticon'); icon.innerHTML=opts.icon||FOLDER_SVG;
  const label=el('span','tlabel'); label.textContent=name;
  row.append(arrow,icon,label);
  const kids=el('div','tchildren');
  node.append(row,kids);
  let loaded=false, open=false, loading=false;
  async function toggle(force){
    open = (force===undefined) ? !open : force;
    arrow.classList.toggle('open',open); kids.classList.toggle('open',open);
    if(open&&!loaded&&!loading){
      loading=true; arrow.classList.add('busy');
      let subs=[];
      try{ subs=await loadChildren(p); }catch(e){}
      loading=false; arrow.classList.remove('busy'); loaded=true;
      if(!subs.length){ arrow.classList.add('leaf'); }
      subs.forEach(s=>kids.appendChild(makeTreeNode(s.name,s.path,s.opts,depth+1)));
    }
  }
  arrow.onclick=e=>{ e.stopPropagation(); toggle(); };
  row.onclick=async()=>{
    document.querySelectorAll('.trow.sel').forEach(r=>r.classList.remove('sel'));
    row.classList.add('sel');
    if(!clickable){ toggle(); return; }   // 네트워크/컴퓨터 노드는 클릭=펼침
    curFolder=p;
    toast('폴더 읽는 중…');
    const r=await API.loadFolder(p);
    if(r&&r.ok){ toast(r.count?`${name} · ${r.count}장`:`${name} · 이미지 없음`); }
    else toast('폴더를 열 수 없습니다');
  };
  row.ondblclick=()=>toggle();   // 더블클릭 시 펼침/접힘 토글
  return node;
}

// 클릭만 → 선택 + 우측 미리보기
function select(i){
  idx=i;
  $('#grid').querySelectorAll('.tile,.dl-row').forEach(t=>t.classList.toggle('active',+t.dataset.i===i));
  const active=$(`.tile[data-i="${i}"],.dl-row[data-i="${i}"]`); if(active) active.scrollIntoView({block:'nearest'});
  renderPreview();
  setBtns(true);
  updateStatus();
}
function renderPreview(){
  const im=current(), p=$('#preview');
  if(!im){ p.innerHTML='<div class="preview-empty">목록에서 이미지를 클릭하면<br>여기에 미리보기가 나와요</div>'; return; }
  // 썸네일이 있으면 즉시 표시(빠르게), 없으면 원본
  const fast = im.thumb || im.url;
  p.innerHTML=`
    <div class="pv-img"><img id="pvImg" src="${fast}" draggable="false"></div>
    <div class="pv-meta">
      <div class="pv-name" title="${esc(im.name)}">${esc(im.name)}</div>
      <div class="pv-dim" id="pvDim">${im.dw?`${im.dw} × ${im.dh}`:'…'}</div>
    </div>
    <button class="tbtn accent pv-open" id="pvOpen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>크게 보기</button>`;
  const pv=$('#pvImg');
  pv.ondblclick=()=>openSingle(idx);
  $('#pvOpen').onclick=()=>openSingle(idx);
  if(!im.thumb) makeThumb(im).then(t=>{ if(current()===im) pv.src=t; });
  ensureDims(im).then(d=>{ if(current()===im) $('#pvDim').textContent=`${d.w} × ${d.h}`; });
}

// ---- 단독 크게보기 ----
function openSingle(i){ idx=i; setMode('single'); showSingle(); }
function showSingle(){
  if(!images.length)return;
  rotation=0; zoom=1; fitMode=true; panX=0; panY=0;
  brightness=100; $('#brightR').value=100; $('#brightVal').textContent='100%';
  const im=current(), el=$('#mainImg');
  el.src=im.url; applyBrightness();
  $('#navPrev').style.display=$('#navNext').style.display=images.length>1?'grid':'none';
  applyTransform();
  el.onload=updateStatus;
  setBtns(true);
  document.title=`${im.name} — ImgView`;
  updateZipBar(im);
}
function applyBrightness(){ $('#mainImg').style.filter='brightness('+(brightness/100)+')'; }
$('#brightR').oninput=e=>{ brightness=+e.target.value; $('#brightVal').textContent=brightness+'%'; applyBrightness(); };

// ---- ImgZip 용량 절감 안내 ----
async function estimateCompressed(im){
  if(im.est!==undefined) return im.est;
  try{
    const img=new Image(); img.src=im.url; await img.decode();
    const cv=document.createElement('canvas'); cv.width=img.naturalWidth; cv.height=img.naturalHeight;
    cv.getContext('2d').drawImage(img,0,0);
    const blob=await new Promise(r=>cv.toBlob(r,'image/webp',0.8));
    im.est = blob?blob.size:null;
  }catch(e){ im.est=null; }
  return im.est;
}
async function updateZipBar(im){
  const bar=$('#zipBar'); bar.style.display='none';
  if(!API||!im.path||!im.size) return;
  const est=await estimateCompressed(im);
  if(current()!==im || !est || est>=im.size*0.9) return;
  const pct=Math.round((1-est/im.size)*100);
  $('#zipText').innerHTML=`이 이미지는 약 <b>${pct}%</b> 줄일 수 있어요 · ${fmtSize(im.size)} → ${fmtSize(est)}`;
  $('#zipBtn').lastChild.textContent = imgzip.installed ? '용량 줄이기' : 'ImgZip 설치하고 줄이기';
  bar.style.display='flex';
}
$('#zipBtn').onclick=async()=>{
  const im=current(); if(!im||!im.path)return;
  if(imgzip.installed){ const r=await API.openInImgZip(im.path); if(r&&r.ok)toast('ImgZip에서 여는 중…'); else toast('ImgZip 실행 실패'); }
  else if(confirm('ImgZip(이미집)가 설치되어 있지 않습니다. 설치/다운로드 페이지를 여시겠어요?')) API.openExternal('https://github.com/homebox78/ImgZip');
};
function singleNav(d){ idx=(idx+d+images.length)%images.length; showSingle(); }
function backToGrid(){ setMode('grid'); renderGrid(); select(idx); }

function applyTransform(){
  const el=$('#mainImg');
  if(zoom<=1){ panX=0; panY=0; }
  el.style.transform=`translate(${panX}px,${panY}px) rotate(${rotation}deg) scale(${zoom})`;
  el.style.cursor = zoom>1 ? (panning?'grabbing':'grab') : 'default';
  $('#zoomLabel').textContent=Math.round(zoom*100)+'%';
}
function zoomBy(f){ fitMode=false; zoom=Math.max(0.1,Math.min(8, zoom*f)); applyTransform(); }
function updateStatus(){
  if(!images.length){ $('#statLeft').textContent='이미지를 열어주세요'; return; }
  if(mode==='single'){
    const im=current(),el=$('#mainImg');
    $('#statLeft').innerHTML=`<b>[${idx+1}/${images.length}]</b> ${esc(im.name)} — ${el.naturalWidth}×${el.naturalHeight}`;
  }else{
    $('#statLeft').innerHTML=`<b>${images.length}장</b> · 이미지를 더블클릭하면 크게 볼 수 있어요`;
  }
}
function setBtns(on){['rotL','rotR','resizeBtn','convBtn','renameBtn','delBtn'].forEach(id=>$('#'+id).disabled=!on);}

// 편집 후 화면 갱신(그리드 타일·미리보기·단독뷰 동시)
function refreshViews(){
  const im=current(); if(!im)return;
  const tImg=$(`.tile[data-i="${idx}"] .tile-img img`); if(tImg)tImg.src=im.url;
  if(mode==='grid') renderPreview();
  if(mode==='single'){ $('#mainImg').src=im.url; applyTransform(); }
}

// ---- 이동/줌 (단독뷰) ----
$('#backBtn').onclick=backToGrid;
$('#navPrev').onclick=()=>singleNav(-1);
$('#navNext').onclick=()=>singleNav(1);
$('#zoomIn').onclick=()=>zoomBy(1.25);
$('#zoomOut').onclick=()=>zoomBy(0.8);
$('#zoomFit').onclick=()=>{zoom=1;fitMode=true;panX=0;panY=0;applyTransform();};
// 알씨식 휠: 기본=이전/다음 이미지, Ctrl+휠=확대/축소
$('#singleScreen').addEventListener('wheel',e=>{
  if(mode!=='single')return; e.preventDefault();
  if(e.ctrlKey){ zoomBy(e.deltaY<0?1.12:0.9); }
  else { singleNav(e.deltaY<0?-1:1); }
},{passive:false});
// 이미지 더블클릭 → 목록으로
$('#mainImg').addEventListener('dblclick',e=>{ e.preventDefault(); backToGrid(); });
// 확대 상태에서 드래그로 이동(팬)
$('#mainImg').addEventListener('mousedown',e=>{
  if(mode!=='single'||zoom<=1)return;
  panning=true; e.preventDefault();
  const sx=e.clientX,sy=e.clientY,bx=panX,by=panY;
  const move=ev=>{ panX=bx+(ev.clientX-sx); panY=by+(ev.clientY-sy); applyTransform(); };
  const up=()=>{ panning=false; applyTransform(); window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up); };
  window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  applyTransform();
});

// ---- 회전 후 저장 ----
async function rotateSave(deg){
  const im=current(); if(!im)return;
  if(mode==='single'){ rotation=(rotation+deg)%360; applyTransform(); }
  if(!API||!im.path){ toast('표시만 회전했어요 (데스크톱 빌드에서 저장됩니다)'); return; }
  const blob=await renderToBlob(im,deg,null,null);
  const r=await API.saveOverwrite({srcPath:im.path,data:await blob.arrayBuffer(),backup:true});
  if(r.ok){ rotation=0; im.url=URL.createObjectURL(blob); refreshViews();
    toast('회전 저장 완료 (원본은 ImgView_원본 폴더)'); }
  else toast('저장 실패: '+r.error);
}
$('#rotL').onclick=()=>rotateSave(-90);
$('#rotR').onclick=()=>rotateSave(90);

// 캔버스로 회전/리사이즈 적용해 blob 생성
async function renderToBlob(im, addDeg=0, resize=null, fmt=null, quality=0.9){
  const img=new Image(); img.src=im.url; await img.decode();
  let w=img.naturalWidth,h=img.naturalHeight;
  const deg=((addDeg%360)+360)%360;
  if(resize){ w=resize.w; h=resize.h; }
  const swap=(deg===90||deg===270);
  const cw=swap?h:w, ch=swap?w:h;
  const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
  const ctx=cv.getContext('2d'); ctx.imageSmoothingQuality='high';
  ctx.translate(cw/2,ch/2); ctx.rotate(deg*Math.PI/180);
  ctx.drawImage(img,-w/2,-h/2,w,h);
  let type='image/jpeg';
  const ext=(fmt|| im.name.split('.').pop()).toLowerCase();
  if(ext==='png')type='image/png'; else if(ext==='webp')type='image/webp'; else if(ext==='bmp')type='image/png';
  return await new Promise(r=>cv.toBlob(r,type,quality));
}

// ---- 크기변경 ----
$('#resizeBtn').onclick=()=>{$('#resizeScrim').classList.add('show');};
$('#rzMode').onchange=e=>{
  $('#rzRatioRow').style.display=e.target.value==='ratio'?'block':'none';
  $('#rzResRow').style.display=e.target.value==='res'?'block':'none';
  $('#rzLongRow').style.display=e.target.value==='long'?'block':'none';
};
$('#rzApply').onclick=async()=>{
  const im=current(); if(!im)return;
  const d=await getDims(im.url); let w=d.w,h=d.h;
  const m=$('#rzMode').value;
  if(m==='ratio'){const r=(+$('#rzRatio').value||100)/100;w=Math.round(w*r);h=Math.round(h*r);}
  else if(m==='res'){w=+$('#rzW').value||w;h=+$('#rzH').value||h;}
  else{const t=+$('#rzLong').value||Math.max(w,h);if(w>=h){h=Math.round(h*t/w);w=t;}else{w=Math.round(w*t/h);h=t;}}
  closeDialogs();
  if(!API||!im.path){toast('데스크톱 빌드에서 저장됩니다');return;}
  const blob=await renderToBlob(im,0,{w,h});
  const r=await API.saveOverwrite({srcPath:im.path,data:await blob.arrayBuffer(),backup:true});
  if(r.ok){im.url=URL.createObjectURL(blob);refreshViews();toast(`${w}×${h} 크기변경 완료`);}
  else toast('저장 실패');
};

// ---- 포맷변환 ----
$('#convBtn').onclick=()=>{$('#convScrim').classList.add('show');};
$('#cvFmt').onchange=e=>$('#cvQRow').style.display=(e.target.value==='png'||e.target.value==='bmp')?'none':'block';
$('#cvQ').oninput=e=>$('#cvQVal').textContent=e.target.value;
$('#cvApply').onclick=async()=>{
  const im=current(); if(!im)return;
  const fmt=$('#cvFmt').value, q=(+$('#cvQ').value)/100;
  closeDialogs();
  const blob=await renderToBlob(im,0,null,fmt,q);
  const base=im.name.replace(/\.[^.]+$/,'');
  const name=`${base}.${fmt}`;
  if(!API||!API.saveFiles){
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();toast('다운로드 시작');return;
  }
  const r=await API.saveFiles({files:[{name,data:await blob.arrayBuffer()}]});
  if(r.ok)toast(`${fmt.toUpperCase()}로 변환 저장 완료`); else if(!r.canceled)toast('저장 실패');
};

// ---- 이름변경 (Electron은 prompt() 미지원 → 커스텀 다이얼로그) ----
$('#renameBtn').onclick=()=>{
  const im=current();if(!im||!API||!im.path){toast('데스크톱 빌드에서 가능합니다');return;}
  const inp=$('#rnInput'); inp.value=im.name;
  $('#renameScrim').classList.add('show');
  setTimeout(()=>{ inp.focus(); const dot=im.name.lastIndexOf('.'); inp.setSelectionRange(0, dot>0?dot:im.name.length); },50);
};
async function doRename(){
  const im=current(); if(!im||!API||!im.path){closeDialogs();return;}
  const nn=($('#rnInput').value||'').trim();
  closeDialogs();
  if(!nn||nn===im.name)return;
  const r=await API.renameFile({srcPath:im.path,newName:nn});
  if(r.ok){im.name=nn;im.path=r.path;
    if(mode==='single')document.title=`${nn} — ImgView`;
    renderGrid(); if(mode==='grid')select(idx); else updateStatus(); toast('이름변경 완료');}
  else toast(r.error||'이름변경 실패');
}
$('#rnApply').onclick=doRename;
$('#rnInput')&&$('#rnInput').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();doRename();} });
$('#delBtn').onclick=async()=>{
  const im=current();if(!im)return;
  if(!confirm(`${im.name}을(를) 삭제할까요? (휴지통으로 이동)`))return;
  if(API&&im.path){const r=await API.deleteFile(im.path);if(!r.ok){toast(r.error);return;}}
  URL.revokeObjectURL(im.url); images.splice(idx,1);
  if(!images.length){ setMode('grid'); renderGrid(); renderPreview(); setBtns(false); document.title='ImgView'; toast('삭제 완료'); return; }
  idx=Math.min(idx,images.length-1);
  if(mode==='single') showSingle(); else { renderGrid(); select(idx); }
  toast('삭제 완료');
};

// ---- 열기 ----
$('#openBtn').onclick=async()=>{ if(API){await API.openFiles();} else $('#fileInput').click(); };
$('#folderBtn').onclick=async()=>{ if(API){await API.openFolder();} else toast('폴더 열기는 데스크톱 빌드에서 가능합니다'); };

// 웹 폴백 파일 입력
const fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.multiple=true;fi.hidden=true;fi.id='fileInput';
document.body.appendChild(fi);
fi.onchange=e=>{const fs=[...e.target.files].map(f=>({name:f.name,blob:f,size:f.size,created:f.lastModified}));addFiles(fs);e.target.value='';};

// 드래그앤드롭 (본문 전체)
const bodyEl=$('#body');
['dragenter','dragover'].forEach(ev=>bodyEl.addEventListener(ev,e=>{e.preventDefault();if(mode==='grid')$('#gridScreen').classList.add('drag');}));
['dragleave','drop'].forEach(ev=>bodyEl.addEventListener(ev,e=>{e.preventDefault();$('#gridScreen').classList.remove('drag');}));
bodyEl.addEventListener('drop',e=>{
  const fs=[...e.dataTransfer.files].filter(f=>/^image\//.test(f.type)).map(f=>({name:f.name,blob:f,size:f.size,created:f.lastModified}));
  if(fs.length){ if(mode==='single')backToGrid(); addFiles(fs); }
});

// 데스크톱: main → renderer 파일 수신 (opts.replace=true면 기존 목록 교체)
if(API&&API.onAddFiles){
  API.onAddFiles((files,opts)=>{
    if(opts&&opts.replace){ clearImages(); if(mode==='single')setMode('grid'); }
    const list=files.map(f=>({name:f.name,path:f.path,size:f.size,created:f.created,url:URL.createObjectURL(new Blob([f.data],{type:mimeOf(f.name)}))}));
    addFiles(list);
  });
}

// 다이얼로그 닫기
function closeDialogs(){document.querySelectorAll('.scrim').forEach(s=>s.classList.remove('show'));}
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeDialogs);
document.querySelectorAll('.scrim').forEach(s=>s.onclick=e=>{if(e.target===s)closeDialogs();});

// 단축키
document.addEventListener('keydown',e=>{
  if(document.querySelector('.scrim.show')){if(e.key==='Escape')closeDialogs();return;}
  if(!images.length)return;
  if(mode==='single'){
    // 이동: ←/→, Space/Backspace, PageUp/PageDown (알씨식)
    if(e.key==='ArrowRight'||e.key==='PageDown'){e.preventDefault();singleNav(1);}
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();singleNav(-1);}
    else if(e.key===' '){e.preventDefault();singleNav(1);}
    else if(e.key==='Backspace'){e.preventDefault();singleNav(-1);}
    else if(e.key==='Home')openSingle(0);
    else if(e.key==='End')openSingle(images.length-1);
    // 줌: +, -, 0(맞춤), 1(원본 100%)
    else if(e.key==='+'||e.key==='='){e.preventDefault();zoomBy(1.25);}
    else if(e.key==='-'||e.key==='_'){e.preventDefault();zoomBy(0.8);}
    else if(e.key==='0'){e.preventDefault();zoom=1;fitMode=true;panX=0;panY=0;applyTransform();}
    else if(e.key==='1'){e.preventDefault();fitMode=false;zoom=1;applyTransform();}
    else if(e.key==='Escape') backToGrid();
    else if(e.key==='Enter') backToGrid();              // 알씨: Enter로 보기 토글
    else if(e.key==='Delete')$('#delBtn').click();
    else if(e.key==='F2')$('#renameBtn').click();
    // 회전: Ctrl+. 우, Ctrl+, 좌 (알씨식) / Ctrl+T 도 우회전
    else if(e.ctrlKey&&(e.key==='.'||e.key==='t')){e.preventDefault();rotateSave(90);}
    else if(e.ctrlKey&&e.key===','){e.preventDefault();rotateSave(-90);}
    else if(e.ctrlKey&&e.key==='r'){e.preventDefault();$('#resizeBtn').click();}
    else if(e.ctrlKey&&e.key==='e'){e.preventDefault();$('#convBtn').click();}
  }else if(mode==='grid'){
    if(e.key==='ArrowRight'||e.key==='ArrowDown')select(Math.min(idx+1,images.length-1));
    else if(e.key==='ArrowLeft'||e.key==='ArrowUp')select(Math.max(idx-1,0));
    else if(e.key==='Home')select(0);
    else if(e.key==='End')select(images.length-1);
    else if(e.key==='Enter'||e.key===' '){e.preventDefault();openSingle(idx);}
    else if(e.key==='Delete')$('#delBtn').click();
    else if(e.key==='F2')$('#renameBtn').click();
  }
});

// 보기 전환 버튼
$('#vThumb').onclick=()=>setView('thumb');
$('#vList').onclick=()=>setView('list');

// ---- 초기화 ----
if(!API) $('#tree').style.display='none';   // 웹에서는 트리 숨김
else $('#pathInput').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();openPathInput();} });
enhanceSelect($('#rzMode')); enhanceSelect($('#cvFmt'));   // 커스텀 드롭다운
if(API&&API.imgzipInfo){ API.imgzipInfo().then(info=>{ imgzip=info||imgzip; }); }
setMode('grid');
renderGrid();
renderPreview();
initTree();
</script>
