// ---- 다중 이름변경 (번호/날짜/시간 등 변수 지원) ----
let batchSel=[];
const pad=(v,n)=>String(v).padStart(n,'0');
// 패턴 + 순번(seq) + 원본 + 시각(now) → 새 파일명
function applyTokens(pattern, seq, im, now){
  const ext=(im.name.match(/\.[^.]+$/)||[''])[0];
  const base=im.name.slice(0, im.name.length-ext.length);
  const Y=now.getFullYear(), Mo=pad(now.getMonth()+1,2), D=pad(now.getDate(),2);
  const H=pad(now.getHours(),2), Mi=pad(now.getMinutes(),2), S=pad(now.getSeconds(),2);
  let out=String(pattern)
    .replace(/<번호:(\d+)>/g,(_,d)=>pad(seq,+d))
    .replace(/<번호>/g, String(seq))
    .replace(/<날짜>/g, `${Y}${Mo}${D}`)
    .replace(/<시간>/g, `${H}${Mi}${S}`)
    .replace(/<년>/g, String(Y)).replace(/<월>/g, Mo).replace(/<일>/g, D)
    .replace(/<시>/g, H).replace(/<분>/g, Mi).replace(/<초>/g, S)
    .replace(/<원본>/g, base)
    .replace(/#+/g, m=>pad(seq,m.length));   // bare # 도 번호로
  // 윈도우 파일명 금지문자 정리
  out=out.replace(/[\\/:*?"<>|]/g,'_').trim();
  if(!out) out=base;
  return out+ext;
}
function batchNames(){
  const pat=$('#brPattern').value||'';
  let seq=parseInt($('#brStart').value,10); if(isNaN(seq))seq=1;
  let step=parseInt($('#brStep').value,10); if(isNaN(step)||step<1)step=1;
  const now=new Date();
  return batchSel.map((i,k)=>({ i, old:images[i].name, neu:applyTokens(pat, seq+k*step, images[i], now) }));
}
function renderBatchPreview(){
  const rows=batchNames();
  // 중복 검사(같은 폴더 내 새 이름끼리)
  const seen={}; rows.forEach(r=>{seen[r.neu]=(seen[r.neu]||0)+1;});
  const max=8;
  let html=rows.slice(0,max).map(r=>{
    const dup=seen[r.neu]>1;
    return `<div class="br-line"><span class="br-old">${esc(r.old)}</span><span class="br-arr">→</span><span class="br-new ${dup?'br-dup':''}">${esc(r.neu)}${dup?' ⚠':''}</span></div>`;
  }).join('');
  if(rows.length>max) html+=`<div class="br-more">…외 ${rows.length-max}개</div>`;
  $('#brPreview').innerHTML=html;
}
function openBatchRename(sel){
  batchSel=sel;
  $('#brCount').textContent=`(${sel.length}개)`;
  // 공통 접두어를 추정해 기본 패턴 제안

}

$('#brApply').onclick=async()=>{
  const rows=batchNames();
  closeDialogs();
  if(!rows.length)return;
  let ok=0, fail=0;
  // 임시명 2단계 처리로 순환 충돌(A↔B) 방지
  const tmpSuffix='.imgview_tmp_';
  // 1단계: 임시 이름으로
  for(let k=0;k<rows.length;k++){
    const im=images[rows[k].i];
    const tmp=tmpSuffix+k+(im.name.match(/\.[^.]+$/)||[''])[0];
    const r=await API.renameFile({srcPath:im.path,newName:tmp});
    if(r.ok){ im.path=r.path; im._tmp=true; } else { im._tmp=false; }
  }
  // 2단계: 최종 이름으로
  for(let k=0;k<rows.length;k++){
    const im=images[rows[k].i];
    if(im._tmp===false){ fail++; delete im._tmp; continue; }
    const r=await API.renameFile({srcPath:im.path,newName:rows[k].neu});
    if(r.ok){ im.name=rows[k].neu; im.path=r.path; ok++; } else { fail++; }
    delete im._tmp;
  }
  renderGrid(); if(mode==='grid'){ syncSelClasses(); renderPreview(); } updateStatus();
  toast(fail? `${ok}개 변경 · ${fail}개 실패` : `${ok}개 이름변경 완료`);
};
$('#delBtn').onclick=async()=>{
  const sel=(mode==='grid')?selIndices():[idx];
  if(!sel.length||!images[sel[0]])return;
  if(sel.length>1){
    if(!confirm(`선택한 ${sel.length}개를 삭제할까요? (휴지통으로 이동)`))return;
    let ok=0,fail=0;
    // 인덱스가 큰 것부터 제거해야 splice 후 위치가 안 어긋남
    for(const i of [...sel].sort((a,b)=>b-a)){
      const im=images[i]; if(!im)continue;
      if(API&&im.path){ const r=await API.deleteFile(im.path); if(!r.ok){fail++;continue;} }
      URL.revokeObjectURL(im.url); images.splice(i,1); ok++;
    }
    selected.clear();
    if(!images.length){ setMode('grid'); renderGrid(); renderPreview(); setBtns(false); document.title='ImgZipView'; }
    else { idx=Math.min(idx,images.length-1); if(idx<0)idx=0; setMode('grid'); renderGrid(); select(idx); }
    toast(fail?`${ok}개 삭제 · ${fail}개 실패`:`${ok}개 삭제 완료`);
    return;
  }
  const im=images[sel[0]];
  if(!confirm(`${im.name}을(를) 삭제할까요? (휴지통으로 이동)`))return;
  if(API&&im.path){const r=await API.deleteFile(im.path);if(!r.ok){toast(r.error);return;}}
  URL.revokeObjectURL(im.url); images.splice(sel[0],1);
  if(!images.length){ setMode('grid'); renderGrid(); renderPreview(); setBtns(false); document.title='ImgZipView'; toast('삭제 완료'); return; }
  idx=Math.min(idx,images.length-1);

(function setupMarquee(){
  const g=$('#grid'); if(!g)return;
  let box=null,sx=0,sy=0,dragging=false,moved=false,additive=false,baseSel=null;
  g.addEventListener('mousedown',e=>{
    if(e.button!==0||mode!=='grid'||!images.length)return;
    if(e.target.closest('.folder-card'))return;
    sx=e.clientX;sy=e.clientY;moved=false;dragging=true;
    additive=e.ctrlKey||e.metaKey||e.shiftKey;
    baseSel=new Set(selected);
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const dx=e.clientX-sx,dy=e.clientY-sy;
    if(!moved){ if(Math.hypot(dx,dy)<5)return; moved=true; if(!box){box=el('div','marquee');document.body.appendChild(box);} box.style.display='block'; }
    const x=Math.min(sx,e.clientX),y=Math.min(sy,e.clientY),w=Math.abs(dx),h=Math.abs(dy);
    box.style.left=x+'px';box.style.top=y+'px';box.style.width=w+'px';box.style.height=h+'px';
    const R={left:x,top:y,right:x+w,bottom:y+h};
    const ns=additive?new Set(baseSel):new Set();
    g.querySelectorAll('.tile,.dl-row').forEach(t=>{
      const r=t.getBoundingClientRect();
      if(r.left<R.right&&r.right>R.left&&r.top<R.bottom&&r.bottom>R.top) ns.add(+t.dataset.i);
    });
    selected=ns; syncSelClasses(); updateStatus();
  });
  window.addEventListener('mouseup',()=>{
    if(!dragging)return; dragging=false;
    if(box)box.style.display='none';
    if(moved){
      g._dragged=true; setTimeout(()=>{g._dragged=false;},0);
      if(selected.size) idx=Math.max(...selected);
      renderPreview(); setBtns(selected.size>0); updateStatus();
    }
  });
})();

const NUM_DN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
function enhanceNumber(inp){
  if(inp._numEnhanced)return; inp._numEnhanced=true;
  const wrap=el('div','num');
  inp.parentNode.insertBefore(wrap,inp); wrap.appendChild(inp);
  const btns=el('div','num-btns');
  const up=el('button'); up.type='button'; up.tabIndex=-1; up.innerHTML=NUM_UP;
  const dn=el('button'); dn.type='button'; dn.tabIndex=-1; dn.innerHTML=NUM_DN;
  btns.append(up,dn); wrap.appendChild(btns);
  const step=()=>parseFloat(inp.step)||1;
  const bump=d=>{
    let v=parseFloat(inp.value); if(isNaN(v))v=0; v=+(v+d*step()).toFixed(6);
    if(inp.min!==''&&v<+inp.min)v=+inp.min; if(inp.max!==''&&v>+inp.max)v=+inp.max;
    inp.value=v;
    inp.dispatchEvent(new Event('input',{bubbles:true}));
    inp.dispatchEvent(new Event('change',{bubbles:true}));
  };
  // 누르고 있으면 반복
  let timer=null, hold=null;
  const start=d=>{ bump(d); hold=setTimeout(()=>{ timer=setInterval(()=>bump(d),70); },380); };
  const stop=()=>{ clearTimeout(hold); clearInterval(timer); timer=hold=null; };
  [['up',up,1],['dn',dn,-1]].forEach(([,b,d])=>{
    b.addEventListener('mousedown',e=>{e.preventDefault();start(d);});
    b.addEventListener('mouseup',stop); b.addEventListener('mouseleave',stop);
  });
}

(function setupResizers(){

  const clampW=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
  try{ const tw=+localStorage.getItem('izv_treeW3'); if(tw) tree.style.width=clampW(tw,150,480)+'px'; }catch(e){}
  try{ const pw=+localStorage.getItem('izv_prevW'); if(pw) prev.style.width=clampW(pw,240,720)+'px'; }catch(e){}
  function drag(handle, el, mn, mx, key, leftSide){
    if(!handle) return;
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();
      const startX=e.clientX, startW=el.getBoundingClientRect().width;
      handle.classList.add('drag'); document.body.classList.add('col-resizing');
      const move=ev=>{ let w=leftSide?startW+(ev.clientX-startX):startW-(ev.clientX-startX); el.style.width=clampW(w,mn,mx)+'px'; };
      const up=()=>{ handle.classList.remove('drag'); document.body.classList.remove('col-resizing');
        try{ localStorage.setItem(key, parseInt(el.style.width)); }catch(e){}
        window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up); };
      window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
    });
    handle.addEventListener('dblclick',()=>{ const d=leftSide?300:340; el.style.width=d+'px'; try{localStorage.setItem(key,d);}catch(e){} });
  }
  drag($('#rzTree'), tree, 150, 480, 'izv_treeW3', true);    // 좌측 트리(150~480)
  drag($('#rzPrev'), prev, 240, 720, 'izv_prevW', false);   // 우측 미리보기(240~720)
})();
setMode('grid');
renderGrid();
renderPreview();
initTree();
</script>
</body>
