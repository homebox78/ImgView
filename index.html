<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImgView — 보기 좋게, 빠르게</title>
<style>
@font-face{
  font-family:'Pretendard Variable';font-weight:45 920;font-style:normal;
  font-display:swap;src:url('fonts/PretendardVariable.woff2') format('woff2');
}
/* === ImgView — ImageZip 시리즈 공통 다크 민트 톤 === */
:root{
  --bg:#0c0d10;--bg-soft:#101216;--surface:#15171c;--surface-2:#1b1e25;
  --surface-3:#22262f;--border:#272b34;--border-soft:#1f232b;
  --text:#fff;--text-dim:#eef1f6;--text-faint:#ccd2dc;
  --accent:#3fe0b0;--accent-deep:#1aa888;--accent-ink:#04221b;
  --accent-glow:rgba(63,224,176,.18);--danger:#ff7a7a;
  --radius:18px;--radius-sm:12px;
  --shadow:0 24px 60px -18px rgba(0,0,0,.7);--shadow-soft:0 10px 30px -12px rgba(0,0,0,.6);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
  background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;
  overflow:hidden;letter-spacing:-.01em;user-select:none}
.atmos{position:fixed;inset:0;z-index:-2;pointer-events:none}
.atmos::before{content:"";position:absolute;top:-30%;left:50%;transform:translateX(-50%);
  width:80vw;height:60vh;background:radial-gradient(ellipse at center,var(--accent-glow),transparent 65%);
  filter:blur(40px);opacity:.6}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* 상단바 */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border-soft);flex:none}
.brand{display:flex;align-items:center;gap:11px}
.logo{width:34px;height:34px;border-radius:10px;
  background:linear-gradient(145deg,var(--surface-3),var(--surface));
  border:1px solid var(--border);display:grid;place-items:center}
.logo svg{width:19px;height:19px}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-.03em}
.brand-name b{color:var(--accent)}
.brand-sub{font-size:11px;color:var(--text-faint);margin-top:1px}
.tools{display:flex;align-items:center;gap:7px}
.tbtn{display:flex;align-items:center;gap:6px;height:36px;padding:0 13px;
  border:1px solid var(--border);background:var(--surface);color:var(--text-dim);
  border-radius:9px;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;
  transition:.2s var(--ease)}
.tbtn:hover{color:var(--text);border-color:var(--surface-3);background:var(--surface-2)}
.tbtn.accent{background:linear-gradient(135deg,var(--accent),var(--accent-deep));
  color:var(--accent-ink);border:none;font-weight:800}
.tbtn.accent:hover{transform:translateY(-1px)}
.tbtn svg{width:15px;height:15px}
.tbtn:disabled{opacity:.4;cursor:not-allowed}
.sep{width:1px;height:22px;background:var(--border);margin:0 4px}

/* 본문 */
.body{flex:1;position:relative;display:flex;min-height:0}

/* 빈 화면(드롭존) — 그리드 영역 안에 표시 */
.drophint{margin:auto;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:18px;text-align:center;cursor:pointer}
.gridscreen.drag .grid{background:radial-gradient(ellipse at center,var(--accent-glow),transparent 70%)}
.drop-ico{width:74px;height:74px;border-radius:20px;
  background:linear-gradient(150deg,var(--surface-3),var(--surface));
  border:1px solid var(--border);display:grid;place-items:center;animation:floaty 3.6s ease-in-out infinite}
.gridscreen.drag .drop-ico{animation:none;border-color:var(--accent)}
.drop-ico svg{width:34px;height:34px;color:var(--accent)}
.drop-title{font-size:19px;font-weight:700}
.drop-title em{font-style:normal;color:var(--accent)}
.drop-sub{font-size:13px;color:var(--text-dim);margin-top:6px}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

/* === 그리드 화면: [폴더 트리] [바둑판] [미리보기] === */
.gridscreen{flex:1;display:flex;min-height:0}

/* 좌측 폴더 트리(탐색기) */
.tree{width:240px;flex:none;border-right:1px solid var(--border-soft);overflow:auto;
  padding:8px 6px;background:var(--bg-soft);font-size:12.5px}
.tree-head{display:flex;align-items:center;gap:6px;padding:4px 8px 8px;
  font-size:11px;font-weight:700;color:var(--text-faint);letter-spacing:.02em}
.tnode{}
.trow{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:7px;
  cursor:pointer;color:var(--text-faint);white-space:nowrap;line-height:1.3}
.trow:hover{background:var(--surface-2);color:var(--text)}
.trow.sel{background:var(--surface-3);color:var(--text)}
.tarrow{width:13px;height:13px;flex:none;display:grid;place-items:center;
  color:var(--text-faint);transition:transform .15s var(--ease)}
.tarrow svg{width:9px;height:9px}
.tarrow.open{transform:rotate(90deg)}
.tarrow.leaf{visibility:hidden}
.ticon{width:15px;height:15px;flex:none;color:var(--accent);display:grid;place-items:center}
.ticon svg{width:15px;height:15px}
.tlabel{overflow:hidden;text-overflow:ellipsis}
.tchildren{margin-left:13px;display:none}
.tchildren.open{display:block}

/* 가운데 바둑판 */
.gridmain{flex:1;display:flex;flex-direction:column;min-width:0}
.grid{flex:1;overflow-y:auto;padding:18px;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  grid-auto-rows:min-content;gap:16px;align-content:start}
.grid.empty-mode{display:flex}
.tile{cursor:pointer;border-radius:14px;overflow:hidden;background:var(--surface);
  border:1px solid var(--border-soft);transition:.16s var(--ease)}
.tile:hover{transform:translateY(-3px);border-color:var(--surface-3);box-shadow:var(--shadow-soft)}
.tile.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 12px 28px -14px var(--accent-glow)}
.tile-img{width:100%;aspect-ratio:1/1;background:var(--surface-3);display:grid;place-items:center;overflow:hidden}
.tile-img img{width:100%;height:100%;object-fit:cover;display:block}
.tile-name{padding:8px 10px;font-size:11.5px;color:var(--text-faint);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tile.active .tile-name{color:var(--text)}

/* 우측 미리보기 패널 */
.preview{width:340px;flex:none;border-left:1px solid var(--border-soft);
  padding:18px;display:flex;flex-direction:column;gap:14px;background:var(--bg-soft)}
.preview-empty{margin:auto;text-align:center;color:var(--text-faint);font-size:13px;line-height:1.8}
.pv-img{flex:1;min-height:0;display:grid;place-items:center;background:#000;
  border-radius:14px;overflow:hidden;border:1px solid var(--border-soft)}
.pv-img img{max-width:100%;max-height:100%;object-fit:contain}
.pv-meta{flex:none}
.pv-name{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pv-dim{font-size:12px;color:var(--text-faint);margin-top:4px}
.pv-open{width:100%;justify-content:center;height:40px;font-size:13px}

/* === 단독 크게보기 화면 === */
.viewer{flex:1;position:relative;display:none;align-items:center;justify-content:center;
  background:#000;overflow:hidden;min-width:0}
.viewer img{max-width:100%;max-height:100%;object-fit:contain;
  transition:transform .12s var(--ease)}
.single-back{position:absolute;top:16px;left:16px;z-index:6;display:flex;align-items:center;gap:6px;
  height:36px;padding:0 14px;border-radius:9px;border:1px solid var(--border);
  background:rgba(12,13,16,.55);backdrop-filter:blur(6px);color:#fff;cursor:pointer;
  font-family:inherit;font-size:12.5px;font-weight:600;opacity:0;transition:.2s var(--ease)}
.viewer:hover .single-back{opacity:1}
.single-back:hover{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}

/* 좌우 이동 버튼 */
.nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;
  border-radius:50%;background:rgba(12,13,16,.6);backdrop-filter:blur(6px);
  border:1px solid var(--border);color:#fff;cursor:pointer;display:grid;place-items:center;
  opacity:0;transition:.2s var(--ease);z-index:5}
.viewer:hover .nav{opacity:1}
.nav:hover{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.nav.prev{left:16px}.nav.next{right:16px}
.nav svg{width:20px;height:20px}

/* 하단 상태바 */
.statusbar{flex:none;height:34px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;border-top:1px solid var(--border-soft);font-size:11.5px;color:var(--text-faint)}
.statusbar b{color:var(--text-dim);font-weight:600}
.zoomctl{display:flex;align-items:center;gap:6px}
.zoomctl button{width:24px;height:24px;border-radius:7px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px}
.zoomctl button:hover{color:var(--text);border-color:var(--surface-3)}

/* 다이얼로그 */
.scrim{position:fixed;inset:0;z-index:50;background:rgba(6,7,9,.72);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center}
.scrim.show{display:flex}
.dialog{width:min(420px,calc(100% - 40px));background:linear-gradient(180deg,var(--surface-2),var(--surface));
  border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:var(--shadow)}
.dialog h3{font-size:16px;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--text-dim);font-weight:600;margin-bottom:7px}
.inp,select{width:100%;background:var(--bg-soft);border:1px solid var(--border);border-radius:10px;
  color:var(--text);padding:10px 12px;font-size:13px;font-family:inherit;outline:none}
.inp:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.row2{display:flex;gap:10px}
.dlg-actions{display:flex;gap:10px;margin-top:20px}
.dlg-actions button{flex:1;border:none;cursor:pointer;font-family:inherit;font-weight:700;
  font-size:13.5px;padding:12px;border-radius:11px}
.dlg-actions .ghost{background:var(--surface-3);color:var(--text-dim)}
.dlg-actions .primary{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:var(--accent-ink)}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:99px;background:var(--surface-3)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--accent);cursor:pointer;box-shadow:0 0 0 4px var(--accent-glow)}

/* 토스트 */
.toast{position:fixed;bottom:50px;left:50%;transform:translate(-50%,20px);z-index:60;
  background:var(--surface-3);border:1px solid var(--border);color:var(--text);
  padding:11px 19px;border-radius:11px;font-size:13px;box-shadow:var(--shadow-soft);
  opacity:0;pointer-events:none;transition:.3s var(--ease)}
.toast.show{opacity:1;transform:translate(-50%,0)}
*::-webkit-scrollbar{width:10px}
*::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:99px;border:3px solid var(--bg)}
</style>
</head>
<body>
<div class="atmos"></div>
<div class="app">
  <!-- 상단바 -->
  <header class="topbar">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="5.5" stroke="url(#g)" stroke-width="1.6"/>
          <circle cx="8.4" cy="13" r="1.25" fill="url(#g)"/>
          <path d="M4.8 18.2L9 13.6l2.6 2.4 3.2-3.6 4.4 5" stroke="url(#g)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="g" x1="3" y1="3" x2="21" y2="21"><stop stop-color="#5fe8c2"/><stop offset="1" stop-color="#1aa888"/></linearGradient></defs>
        </svg>
      </div>
      <div><div class="brand-name">Img<b>View</b></div><div class="brand-sub">보기 좋게, 빠르게</div></div>
    </div>
    <div class="tools">
      <button class="tbtn accent" id="openBtn">＋ 열기</button>
      <button class="tbtn" id="folderBtn">폴더</button>
      <span class="sep"></span>
      <button class="tbtn" id="rotL" disabled title="왼쪽 회전 (Ctrl+,)">↺</button>
      <button class="tbtn" id="rotR" disabled title="오른쪽 회전 (Ctrl+T)">↻</button>
      <button class="tbtn" id="resizeBtn" disabled title="크기변경 (Ctrl+R)">크기변경</button>
      <button class="tbtn" id="convBtn" disabled title="포맷변환 (Ctrl+E)">포맷변환</button>
      <span class="sep"></span>
      <button class="tbtn" id="renameBtn" disabled title="이름변경 (F2)">이름변경</button>
      <button class="tbtn" id="delBtn" disabled title="삭제 (Del)">삭제</button>
      <button class="tbtn" id="fsBtn" disabled title="전체화면 (F11)">전체화면</button>
    </div>
  </header>

  <!-- 본문 -->
  <div class="body" id="body">
    <!-- 폴더 트리 + 바둑판 + 우측 미리보기 -->
    <div class="gridscreen" id="gridScreen">
      <aside class="tree" id="tree">
        <div class="tree-head">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          폴더
        </div>
      </aside>
      <div class="gridmain">
        <div class="grid" id="grid"></div>
      </div>
      <aside class="preview" id="preview"></aside>
    </div>

    <!-- 단독 크게보기 -->
    <div class="viewer" id="singleScreen">
      <button class="single-back" id="backBtn">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        목록
      </button>
      <img id="mainImg" alt="">
      <button class="nav prev" id="navPrev" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="nav next" id="navNext" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
  </div>

  <!-- 상태바 -->
  <div class="statusbar">
    <div id="statLeft">이미지를 열어주세요</div>
    <div class="zoomctl" id="zoomctl" style="visibility:hidden">
      <button id="zoomOut">−</button><span id="zoomLabel">100%</span><button id="zoomIn">＋</button>
      <button id="zoomFit" title="창 맞춤">맞춤</button>
    </div>
  </div>
</div>

<!-- 크기변경 다이얼로그 -->
<div class="scrim" id="resizeScrim">
  <div class="dialog">
    <h3>크기변경</h3>
    <div class="field"><label>방식</label>
      <select id="rzMode"><option value="ratio">비율(%)</option><option value="res">해상도</option><option value="long">긴 축(px)</option></select></div>
    <div class="field" id="rzRatioRow"><label>비율(%)</label><input class="inp" id="rzRatio" type="number" value="50"></div>
    <div class="field" id="rzResRow" style="display:none"><label>가로 × 세로</label>
      <div class="row2"><input class="inp" id="rzW" type="number"><input class="inp" id="rzH" type="number"></div></div>
    <div class="field" id="rzLongRow" style="display:none"><label>긴 축(px)</label><input class="inp" id="rzLong" type="number" value="1280"></div>
    <div class="dlg-actions"><button class="ghost" data-close>취소</button><button class="primary" id="rzApply">적용</button></div>
  </div>
</div>

<!-- 포맷변환 다이얼로그 -->
<div class="scrim" id="convScrim">
  <div class="dialog">
    <h3>포맷변환</h3>
    <div class="field"><label>포맷</label>
      <select id="cvFmt"><option value="jpg">JPG</option><option value="png">PNG</option><option value="webp">WebP</option><option value="bmp">BMP</option></select></div>
    <div class="field" id="cvQRow"><label>품질 <span id="cvQVal" style="color:var(--accent)">90</span></label><input type="range" id="cvQ" min="40" max="100" value="90"></div>
    <div class="dlg-actions"><button class="ghost" data-close>취소</button><button class="primary" id="cvApply">변환 저장</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const API = window.imgview || null;

let images = [];          // {name, path, url}
let idx = 0;              // 선택/표시 중인 인덱스
let mode = 'grid';        // 'grid' | 'single'
let rotation = 0, zoom = 1, fitMode = true;

function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function current(){return images[idx]||null;}
const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function getDims(url){return new Promise(res=>{const im=new Image();im.onload=()=>res({w:im.naturalWidth,h:im.naturalHeight});im.src=url;});}
function el(t,c){const e=document.createElement(t);if(c)e.className=c;return e;}

// ---- 모드 전환 ----
function setMode(m){
  mode=m;
  $('#gridScreen').style.display = m==='grid'   ? 'flex':'none';
  $('#singleScreen').style.display = m==='single' ? 'flex':'none';
  $('#zoomctl').style.visibility = m==='single' ? 'visible':'hidden';
  updateStatus();
}

function clearImages(){
  images.forEach(im=>{try{URL.revokeObjectURL(im.url);}catch(e){}});
  images=[]; idx=0;
}

// ---- 파일 추가 ----
function addFiles(list){
  const wasEmpty = images.length===0;
  for(const f of list){
    const url = f.url || URL.createObjectURL(f.blob || f);
    images.push({ name:f.name, path:f.path||null, url });
  }
  if(mode!=='single'){ setMode('grid'); renderGrid(); }
  if(!images.length){ renderPreview(); setBtns(false); updateStatus(); return; }
  if(wasEmpty) select(0); else if(mode==='grid') select(Math.min(idx,images.length-1));
}

// ---- 그리드(바둑판) ----
const DROP_HINT=`<div class="drophint" id="dropHint">
  <div class="drop-ico">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
  </div>
  <div><div class="drop-title">이미지나 폴더를 <em>여기에</em> 끌어다 놓으세요</div>
    <div class="drop-sub">왼쪽 폴더 트리에서 폴더를 고르거나 · 클릭해서 열기</div></div>
</div>`;
function renderGrid(){
  const g=$('#grid');
  if(!images.length){
    g.classList.add('empty-mode'); g.innerHTML=DROP_HINT;
    $('#dropHint').onclick=()=>$('#openBtn').click();
    return;
  }
  g.classList.remove('empty-mode');
  g.innerHTML = images.map((im,i)=>`
    <div class="tile ${i===idx?'active':''}" data-i="${i}">
      <div class="tile-img"><img src="${im.url}" loading="lazy" draggable="false"></div>
      <div class="tile-name" title="${esc(im.name)}">${esc(im.name)}</div>
    </div>`).join('');
  g.querySelectorAll('.tile').forEach(t=>{
    const i=+t.dataset.i;
    t.onclick=()=>select(i);
    t.ondblclick=()=>openSingle(i);
  });
}

// ---- 폴더 트리(탐색기) ----
const FOLDER_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';
const CARET_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';
let curFolder=null;
async function initTree(){
  if(!API||!API.listDrives)return;
  const drives=await API.listDrives();
  const tree=$('#tree');
  drives.forEach(d=>tree.appendChild(makeTreeNode(d.name,d.path)));
}
function makeTreeNode(name,p){
  const node=el('div','tnode');
  const row=el('div','trow'); row.dataset.path=p;
  const arrow=el('span','tarrow'); arrow.innerHTML=CARET_SVG;
  const icon=el('span','ticon'); icon.innerHTML=FOLDER_SVG;
  const label=el('span','tlabel'); label.textContent=name;
  row.append(arrow,icon,label);
  const kids=el('div','tchildren');
  node.append(row,kids);
  let loaded=false, open=false;
  arrow.onclick=async e=>{
    e.stopPropagation();
    open=!open; arrow.classList.toggle('open',open); kids.classList.toggle('open',open);
    if(open&&!loaded){
      loaded=true;
      const subs=await API.listDir(p);
      if(!subs.length){ arrow.classList.add('leaf'); }
      subs.forEach(s=>kids.appendChild(makeTreeNode(s.name,s.path)));
    }
  };
  row.onclick=async()=>{
    document.querySelectorAll('.trow.sel').forEach(r=>r.classList.remove('sel'));
    row.classList.add('sel');
    curFolder=p;
    toast('폴더 읽는 중…');
    const r=await API.loadFolder(p);
    if(r&&r.ok){ toast(r.count?`${name} · ${r.count}장`:`${name} · 이미지 없음`); }
    else toast('폴더를 열 수 없습니다');
  };
  return node;
}

// 클릭만 → 선택 + 우측 미리보기
function select(i){
  idx=i;
  $('#grid').querySelectorAll('.tile').forEach(t=>t.classList.toggle('active',+t.dataset.i===i));
  const active=$(`.tile[data-i="${i}"]`); if(active) active.scrollIntoView({block:'nearest'});
  renderPreview();
  setBtns(true);
  updateStatus();
}
function renderPreview(){
  const im=current(), p=$('#preview');
  if(!im){ p.innerHTML='<div class="preview-empty">목록에서 이미지를 클릭하면<br>여기에 미리보기가 나와요</div>'; return; }
  p.innerHTML=`
    <div class="pv-img"><img id="pvImg" src="${im.url}" draggable="false"></div>
    <div class="pv-meta">
      <div class="pv-name" title="${esc(im.name)}">${esc(im.name)}</div>
      <div class="pv-dim" id="pvDim">불러오는 중…</div>
    </div>
    <button class="tbtn accent pv-open" id="pvOpen">크게 보기 (더블클릭)</button>`;
  const pv=$('#pvImg');
  pv.onload=()=>{ $('#pvDim').textContent=`${pv.naturalWidth} × ${pv.naturalHeight}`; };
  pv.ondblclick=()=>openSingle(idx);
  $('#pvOpen').onclick=()=>openSingle(idx);
}

// ---- 단독 크게보기 ----
function openSingle(i){ idx=i; setMode('single'); showSingle(); }
function showSingle(){
  if(!images.length)return;
  rotation=0; zoom=1; fitMode=true;
  const im=current(), el=$('#mainImg');
  el.src=im.url;
  $('#navPrev').style.display=$('#navNext').style.display=images.length>1?'grid':'none';
  applyTransform();
  el.onload=updateStatus;
  setBtns(true);
  document.title=`${im.name} — ImgView`;
}
function singleNav(d){ idx=(idx+d+images.length)%images.length; showSingle(); }
function backToGrid(){ setMode('grid'); renderGrid(); select(idx); }

function applyTransform(){
  const el=$('#mainImg');
  el.style.transform=`rotate(${rotation}deg) scale(${zoom})`;
  $('#zoomLabel').textContent=Math.round(zoom*100)+'%';
}
function updateStatus(){
  if(!images.length){ $('#statLeft').textContent='이미지를 열어주세요'; return; }
  if(mode==='single'){
    const im=current(),el=$('#mainImg');
    $('#statLeft').innerHTML=`<b>[${idx+1}/${images.length}]</b> ${esc(im.name)} — ${el.naturalWidth}×${el.naturalHeight}`;
  }else{
    $('#statLeft').innerHTML=`<b>${images.length}장</b> · 이미지를 더블클릭하면 크게 볼 수 있어요`;
  }
}
function setBtns(on){['rotL','rotR','resizeBtn','convBtn','renameBtn','delBtn','fsBtn'].forEach(id=>$('#'+id).disabled=!on);}

// 편집 후 화면 갱신(그리드 타일·미리보기·단독뷰 동시)
function refreshViews(){
  const im=current(); if(!im)return;
  const tImg=$(`.tile[data-i="${idx}"] .tile-img img`); if(tImg)tImg.src=im.url;
  if(mode==='grid') renderPreview();
  if(mode==='single'){ $('#mainImg').src=im.url; applyTransform(); }
}

// ---- 이동/줌 (단독뷰) ----
$('#backBtn').onclick=backToGrid;
$('#navPrev').onclick=()=>singleNav(-1);
$('#navNext').onclick=()=>singleNav(1);
$('#zoomIn').onclick=()=>{fitMode=false;zoom=Math.min(zoom*1.25,8);applyTransform();};
$('#zoomOut').onclick=()=>{fitMode=false;zoom=Math.max(zoom*0.8,0.1);applyTransform();};
$('#zoomFit').onclick=()=>{zoom=1;fitMode=true;applyTransform();};
$('#singleScreen').addEventListener('wheel',e=>{
  if(mode!=='single')return; e.preventDefault();
  fitMode=false; zoom=Math.max(0.1,Math.min(8, zoom*(e.deltaY<0?1.1:0.9))); applyTransform();
},{passive:false});

// ---- 회전 후 저장 ----
async function rotateSave(deg){
  const im=current(); if(!im)return;
  if(mode==='single'){ rotation=(rotation+deg)%360; applyTransform(); }
  if(!API||!im.path){ toast('표시만 회전했어요 (데스크톱 빌드에서 저장됩니다)'); return; }
  const blob=await renderToBlob(im,deg,null,null);
  const r=await API.saveOverwrite({srcPath:im.path,data:await blob.arrayBuffer(),backup:true});
  if(r.ok){ rotation=0; im.url=URL.createObjectURL(blob); refreshViews();
    toast('회전 저장 완료 (원본은 ImgView_원본 폴더)'); }
  else toast('저장 실패: '+r.error);
}
$('#rotL').onclick=()=>rotateSave(-90);
$('#rotR').onclick=()=>rotateSave(90);

// 캔버스로 회전/리사이즈 적용해 blob 생성
async function renderToBlob(im, addDeg=0, resize=null, fmt=null, quality=0.9){
  const img=new Image(); img.src=im.url; await img.decode();
  let w=img.naturalWidth,h=img.naturalHeight;
  const deg=((addDeg%360)+360)%360;
  if(resize){ w=resize.w; h=resize.h; }
  const swap=(deg===90||deg===270);
  const cw=swap?h:w, ch=swap?w:h;
  const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
  const ctx=cv.getContext('2d'); ctx.imageSmoothingQuality='high';
  ctx.translate(cw/2,ch/2); ctx.rotate(deg*Math.PI/180);
  ctx.drawImage(img,-w/2,-h/2,w,h);
  let type='image/jpeg';
  const ext=(fmt|| im.name.split('.').pop()).toLowerCase();
  if(ext==='png')type='image/png'; else if(ext==='webp')type='image/webp'; else if(ext==='bmp')type='image/png';
  return await new Promise(r=>cv.toBlob(r,type,quality));
}

// ---- 크기변경 ----
$('#resizeBtn').onclick=()=>{$('#resizeScrim').classList.add('show');};
$('#rzMode').onchange=e=>{
  $('#rzRatioRow').style.display=e.target.value==='ratio'?'block':'none';
  $('#rzResRow').style.display=e.target.value==='res'?'block':'none';
  $('#rzLongRow').style.display=e.target.value==='long'?'block':'none';
};
$('#rzApply').onclick=async()=>{
  const im=current(); if(!im)return;
  const d=await getDims(im.url); let w=d.w,h=d.h;
  const m=$('#rzMode').value;
  if(m==='ratio'){const r=(+$('#rzRatio').value||100)/100;w=Math.round(w*r);h=Math.round(h*r);}
  else if(m==='res'){w=+$('#rzW').value||w;h=+$('#rzH').value||h;}
  else{const t=+$('#rzLong').value||Math.max(w,h);if(w>=h){h=Math.round(h*t/w);w=t;}else{w=Math.round(w*t/h);h=t;}}
  closeDialogs();
  if(!API||!im.path){toast('데스크톱 빌드에서 저장됩니다');return;}
  const blob=await renderToBlob(im,0,{w,h});
  const r=await API.saveOverwrite({srcPath:im.path,data:await blob.arrayBuffer(),backup:true});
  if(r.ok){im.url=URL.createObjectURL(blob);refreshViews();toast(`${w}×${h} 크기변경 완료`);}
  else toast('저장 실패');
};

// ---- 포맷변환 ----
$('#convBtn').onclick=()=>{$('#convScrim').classList.add('show');};
$('#cvFmt').onchange=e=>$('#cvQRow').style.display=(e.target.value==='png'||e.target.value==='bmp')?'none':'block';
$('#cvQ').oninput=e=>$('#cvQVal').textContent=e.target.value;
$('#cvApply').onclick=async()=>{
  const im=current(); if(!im)return;
  const fmt=$('#cvFmt').value, q=(+$('#cvQ').value)/100;
  closeDialogs();
  const blob=await renderToBlob(im,0,null,fmt,q);
  const base=im.name.replace(/\.[^.]+$/,'');
  const name=`${base}.${fmt}`;
  if(!API||!API.saveFiles){
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();toast('다운로드 시작');return;
  }
  const r=await API.saveFiles({files:[{name,data:await blob.arrayBuffer()}]});
  if(r.ok)toast(`${fmt.toUpperCase()}로 변환 저장 완료`); else if(!r.canceled)toast('저장 실패');
};

// ---- 이름변경 / 삭제 ----
$('#renameBtn').onclick=async()=>{
  const im=current();if(!im||!API||!im.path){toast('데스크톱 빌드에서 가능합니다');return;}
  const nn=prompt('새 이름:',im.name); if(!nn||nn===im.name)return;
  const r=await API.renameFile({srcPath:im.path,newName:nn});
  if(r.ok){im.name=nn;im.path=r.path;
    if(mode==='single')document.title=`${nn} — ImgView`;
    renderGrid(); if(mode==='grid')select(idx); updateStatus(); toast('이름변경 완료');}
  else toast(r.error);
};
$('#delBtn').onclick=async()=>{
  const im=current();if(!im)return;
  if(!confirm(`${im.name}을(를) 삭제할까요? (휴지통으로 이동)`))return;
  if(API&&im.path){const r=await API.deleteFile(im.path);if(!r.ok){toast(r.error);return;}}
  URL.revokeObjectURL(im.url); images.splice(idx,1);
  if(!images.length){ setMode('grid'); renderGrid(); renderPreview(); setBtns(false); document.title='ImgView'; toast('삭제 완료'); return; }
  idx=Math.min(idx,images.length-1);
  if(mode==='single') showSingle(); else { renderGrid(); select(idx); }
  toast('삭제 완료');
};

// ---- 전체화면 ----
$('#fsBtn').onclick=()=>{
  if(document.fullscreenElement){document.exitFullscreen();return;}
  if(mode!=='single')openSingle(idx);
  $('#singleScreen').requestFullscreen();
};

// ---- 열기 ----
$('#openBtn').onclick=async()=>{ if(API){await API.openFiles();} else $('#fileInput').click(); };
$('#folderBtn').onclick=async()=>{ if(API){await API.openFolder();} else toast('폴더 열기는 데스크톱 빌드에서 가능합니다'); };

// 웹 폴백 파일 입력
const fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.multiple=true;fi.hidden=true;fi.id='fileInput';
document.body.appendChild(fi);
fi.onchange=e=>{const fs=[...e.target.files].map(f=>({name:f.name,blob:f}));addFiles(fs);e.target.value='';};

// 드래그앤드롭 (본문 전체)
const bodyEl=$('#body');
['dragenter','dragover'].forEach(ev=>bodyEl.addEventListener(ev,e=>{e.preventDefault();if(mode==='grid')$('#gridScreen').classList.add('drag');}));
['dragleave','drop'].forEach(ev=>bodyEl.addEventListener(ev,e=>{e.preventDefault();$('#gridScreen').classList.remove('drag');}));
bodyEl.addEventListener('drop',e=>{
  const fs=[...e.dataTransfer.files].filter(f=>/^image\//.test(f.type)).map(f=>({name:f.name,blob:f}));
  if(fs.length){ if(mode==='single')backToGrid(); addFiles(fs); }
});

// 데스크톱: main → renderer 파일 수신 (opts.replace=true면 기존 목록 교체)
if(API&&API.onAddFiles){
  API.onAddFiles((files,opts)=>{
    if(opts&&opts.replace){ clearImages(); if(mode==='single')setMode('grid'); }
    const list=files.map(f=>({name:f.name,path:f.path,url:URL.createObjectURL(new Blob([f.data]))}));
    addFiles(list);
  });
}

// 다이얼로그 닫기
function closeDialogs(){document.querySelectorAll('.scrim').forEach(s=>s.classList.remove('show'));}
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeDialogs);
document.querySelectorAll('.scrim').forEach(s=>s.onclick=e=>{if(e.target===s)closeDialogs();});

// 단축키
document.addEventListener('keydown',e=>{
  if(document.querySelector('.scrim.show')){if(e.key==='Escape')closeDialogs();return;}
  if(!images.length)return;
  if(mode==='single'){
    if(e.key==='ArrowRight')singleNav(1);
    else if(e.key==='ArrowLeft')singleNav(-1);
    else if(e.key==='Home')openSingle(0);
    else if(e.key==='End')openSingle(images.length-1);
    else if(e.key==='Escape'){ if(document.fullscreenElement)document.exitFullscreen(); else backToGrid(); }
    else if(e.key==='Delete')$('#delBtn').click();
    else if(e.key==='F2')$('#renameBtn').click();
    else if(e.key==='F11'){e.preventDefault();$('#fsBtn').click();}
    else if(e.ctrlKey&&e.key==='t'){e.preventDefault();rotateSave(90);}
    else if(e.ctrlKey&&e.key===','){e.preventDefault();rotateSave(-90);}
    else if(e.ctrlKey&&e.key==='r'){e.preventDefault();$('#resizeBtn').click();}
    else if(e.ctrlKey&&e.key==='e'){e.preventDefault();$('#convBtn').click();}
  }else if(mode==='grid'){
    if(e.key==='ArrowRight'||e.key==='ArrowDown')select(Math.min(idx+1,images.length-1));
    else if(e.key==='ArrowLeft'||e.key==='ArrowUp')select(Math.max(idx-1,0));
    else if(e.key==='Home')select(0);
    else if(e.key==='End')select(images.length-1);
    else if(e.key==='Enter')openSingle(idx);
    else if(e.key==='Delete')$('#delBtn').click();
    else if(e.key==='F2')$('#renameBtn').click();
  }
});

// ---- 초기화 ----
if(!API) $('#tree').style.display='none';   // 웹에서는 트리 숨김
setMode('grid');
renderGrid();
renderPreview();
initTree();
</script>
</body>
</html>
